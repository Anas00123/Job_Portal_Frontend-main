<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employers - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="/assets/css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6f9;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #0b2239;
            color: #fff;
            padding-top: 20px;
            transition: .3s;
            z-index: 1000;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: #cfd8dc;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #133b5c;
            color: #fff;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .4);
            top: 0;
            left: 0;
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .main-content {
            margin-left: 0;
            padding: 20px;
            transition: .3s;
        }

        @media(min-width:992px) {
            .sidebar {
                left: 0
            }

            .main-content {
                margin-left: 250px
            }
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, .06);
        }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar">
        <h4>Admin Panel</h4>
        <a href="dashboard.html"><i class="fa fa-chart-line me-2"></i> Dashboard</a>
        <a href="manageEmployers.html" class="active"><i class="fa fa-building me-2"></i> Employers</a>
        <a href="candidates.html"><i class="fa fa-users me-2"></i> Candidates</a>
        <a href="applications.html"><i class="fa fa-file-alt me-2"></i> Applications</a>
   <a href="#" onclick="openSubAdminSection()"><i class="bi bi-shield-lock me-2"></i> Sub
                            Admins</a>
        <a href="#"><i class="fa fa-cog me-2"></i> Settings</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main-content">

        <nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">
            <div class="container-fluid">
                <button class="btn btn-dark d-lg-none" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
                <span class="navbar-brand mb-0 h4">Employers</span>
                <span class="fw-semibold" id="adminName">Welcome, Admin</span>
            </div>
        </nav>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Total Employers</h6>
                    <h3 id="totalEmployers">—</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Active Employers</h6>
                    <h3 id="activeEmployers">—</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Pending / Suspended</h6>
                    <h3 id="blockedEmployers">—</h3>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <div class="table-responsive">

                <table class="table align-middle">

                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Full Name</th>
                            <th>Company</th>
                            <th>Email</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Registered Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="employerTableBody">
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border spinner-border-sm"></div> Loading...
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>

    </div>

    <script src="/assets/js/bootstrap.js"></script>
    <script src="/assets/js/api.js"></script>

    <script>

        document.addEventListener("DOMContentLoaded", loadEmployers);

        const statusMap = {
            ACTIVE: { cls: "bg-success", label: "Active" },
            PENDING: { cls: "bg-warning text-dark", label: "Pending" },
            SUSPENDED: { cls: "bg-danger", label: "Suspended" }
        };

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        async function loadEmployers() {

            try {

                const data = await apiFetch("/api/admin/recruiters");

                document.getElementById("totalEmployers").textContent = data.length;

                document.getElementById("activeEmployers").textContent =
                    data.filter(r => r.recruiterStatus === "ACTIVE").length;

                document.getElementById("blockedEmployers").textContent =
                    data.filter(r => r.recruiterStatus === "PENDING" || r.recruiterStatus === "SUSPENDED").length;

                const tbody = document.getElementById("employerTableBody");

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" class="text-center">No employers found</td></tr>`;
                    return;
                }

                let rows = "";

                data.forEach((recruiter, index) => {

                    const badge = statusMap[recruiter.recruiterStatus] || {
                        cls: "bg-secondary",
                        label: recruiter.recruiterStatus
                    };

                    const date = recruiter.registeredAt
                        ? new Date(recruiter.registeredAt).toLocaleDateString("en-IN")
                        : "N/A";

                    rows += `
<tr>

<td>${index + 1}</td>

<td>${recruiter.fullName ?? "N/A"}</td>

<td>${recruiter.companyName ?? "N/A"}</td>

<td>${recruiter.email ?? "N/A"}</td>

<td>${recruiter.city ?? "N/A"}</td>

<td>
<span class="badge ${badge.cls}">
${badge.label}
</span>
</td>

<td>${date}</td>

<td>

<button class="btn btn-sm btn-success"
onclick="changeStatus(${recruiter.recruiterId},'ACTIVE')"
${recruiter.recruiterStatus === "ACTIVE" ? "disabled" : ""}>
Activate
</button>

<button class="btn btn-sm btn-warning"
onclick="changeStatus(${recruiter.recruiterId},'SUSPENDED')"
${recruiter.recruiterStatus === "SUSPENDED" ? "disabled" : ""}>
Suspend
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteEmployer(${recruiter.recruiterId})">
<i class="fa fa-trash"></i>
</button>

</td>

</tr>
`;
                });

                tbody.innerHTML = rows;

            } catch (err) {

                console.error(err);

                document.getElementById("employerTableBody").innerHTML =
                    `<tr><td colspan="8" class="text-center text-danger">
Failed to load employers
</td></tr>`;

            }

        }

        async function changeStatus(id, status) {

            const action = status === "ACTIVE" ? "activate" : "suspend";

            if (!confirm(`Are you sure you want to ${action} this recruiter?`)) return;

            try {

                const endpoint =
                    status === "ACTIVE"
                        ? `/api/admin/recruiters/${id}/activate`
                        : `/api/admin/recruiters/${id}/suspend`;

                await apiFetch(endpoint, {
                    method: "PATCH",
                    body: { reason: "Admin action" }
                });

                await loadEmployers();
                // alert(`Recruiter ${action}d successfully`);

            } catch (err) {

                console.error(err);
                alert("Failed to update status");

            }

        }

        async function deleteEmployer(id) {

            if (!confirm("Are you sure you want to delete this employer?")) return;

            try {

                await apiFetch(`/api/admin/recruiters/${id}`, {
                    method: "DELETE"
                });

                await loadEmployers();

            } catch (err) {

                console.error(err);
                alert("Failed to delete employer");

            }

        }

        function logout() {

            document.cookie = "token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC";

            localStorage.removeItem("token");

            window.location.href = "login.html";

        }

    </script>

</body>

</html>
