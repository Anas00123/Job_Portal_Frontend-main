<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employers - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="/assets/css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #f4f6f9;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #0b2239;
            color: #fff;
            padding-top: 20px;
            transition: 0.3s;
            z-index: 1000;
        }

        .sidebar.active { left: 0; }
        .sidebar h4 { text-align: center; margin-bottom: 30px; }

        .sidebar a {
            color: #cfd8dc;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #133b5c;
            color: #fff;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            top: 0; left: 0;
            display: none;
            z-index: 999;
        }

        .overlay.active { display: block; }

        .main-content {
            margin-left: 0;
            padding: 20px;
            transition: 0.3s;
        }

        @media(min-width: 992px) {
            .sidebar { left: 0; }
            .main-content { margin-left: 250px; }
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h4>Admin Panel</h4>
        <a href="dashboard.html"><i class="fa fa-chart-line me-2"></i> Dashboard</a>
        <!-- <a href="manageJobs.html"><i class="fa fa-briefcase me-2"></i> Manage Jobs</a> -->
        <a href="manageEmployers.html" class="active"><i class="fa fa-building me-2"></i> Employers</a>
        <a href="candidates.html"><i class="fa fa-users me-2"></i> Candidates</a>
        <a href="applications.html"><i class="fa fa-file-alt me-2"></i> Applications</a>
        <a href="#"><i class="fa fa-cog me-2"></i> Settings</a>
        <a href="#"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Top Navbar -->
        <nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">
            <div class="container-fluid">
                <button class="btn btn-dark d-lg-none" onclick="toggleSidebar()">
                    <i class="fa fa-bars"></i>
                </button>
                <span class="navbar-brand mb-0 h4">Employers</span>
                <span class="fw-semibold">Welcome, Admin</span>
            </div>
        </nav>

        <!-- Stats -->
        <div class="row g-4 mb-4">
            <div class="col-md-4 col-sm-6">
                <div class="card p-3">
                    <h6>Total Employers</h6>
                    <h3 id="totalEmployers">—</h3>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card p-3">
                    <h6>Active Employers</h6>
                    <h3 id="activeEmployers">—</h3>
                </div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="card p-3">
                    <h6>Pending / Suspended</h6>
                    <h3 id="blockedEmployers">—</h3>
                </div>
            </div>
        </div>

        <!-- Employers Table -->
        <div class="card p-4">
            <!-- <div class="d-flex justify-content-between mb-3">
                <h5>All Employers</h5>
                <button class="btn btn-teal btn-sm">
                    <i class="fa fa-plus"></i> Add Employer
                </button>
            </div> -->

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Full Name</th>
                            <th>Company</th>
                            <th>Email</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Registered Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="employerTableBody">
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="/assets/js/bootstrap.js"></script>
    <script src="/assets/js/script.js"></script>

    <script>
        const API_URL = "http://localhost:8080/api/auth/recruiter";

        function getAuthHeaders() {
            const token = localStorage.getItem("token");
            return {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            };
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        document.addEventListener("DOMContentLoaded", loadEmployers);

        function loadEmployers() {
            fetch(API_URL, { headers: getAuthHeaders() })
                .then(res => {
                    if (res.status === 403) throw new Error("403: Not authorized. Please log in again.");
                    if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);
                    return res.json();
                })
                .then(data => {
                    // Update stat cards
                    document.getElementById("totalEmployers").textContent  = data.length;
                    document.getElementById("activeEmployers").textContent = data.filter(r => r.recruiterStatus === "ACTIVE").length;
                    document.getElementById("blockedEmployers").textContent = data.filter(r =>
                        r.recruiterStatus === "PENDING" || r.recruiterStatus === "SUSPENDED").length;

                    const tbody = document.getElementById("employerTableBody");
                    tbody.innerHTML = "";

                    if (data.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="8" class="text-center">No employers found.</td></tr>`;
                        return;
                    }

                    const statusMap = {
                        "ACTIVE":    { cls: "bg-success",            label: "Active"    },
                        "PENDING":   { cls: "bg-warning text-dark",  label: "Pending"   },
                        "SUSPENDED": { cls: "bg-danger",             label: "Suspended" }
                    };

                    data.forEach((recruiter, index) => {
                        const badge = statusMap[recruiter.recruiterStatus] || { cls: "bg-secondary", label: recruiter.recruiterStatus };
                        const date  = recruiter.registeredAt
                            ? new Date(recruiter.registeredAt).toLocaleDateString("en-IN")
                            : "N/A";

                        tbody.innerHTML += `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${recruiter.fullName    ?? "N/A"}</td>
                                <td>${recruiter.companyName ?? "N/A"}</td>
                                <td>${recruiter.email       ?? "N/A"}</td>
                                <td>${recruiter.city        ?? "N/A"}</td>
                                <td><span class="badge ${badge.cls}">${badge.label}</span></td>
                                <td>${date}</td>
                                <td>
                                    <button class="btn btn-sm btn-success" 
                                        onclick="changeStatus(${recruiter.recruiterId}, 'ACTIVE')"
                                        ${recruiter.recruiterStatus === 'ACTIVE' ? 'disabled' : ''}>
                                        Active
                                    </button>
                                    <button class="btn btn-sm btn-warning"
                                        onclick="changeStatus(${recruiter.recruiterId}, 'SUSPENDED')"
                                        ${recruiter.recruiterStatus === 'SUSPENDED' ? 'disabled' : ''}>
                                        Suspend
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteEmployer(${recruiter.recruiterId})">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(err => {
                    console.error("Failed to load employers:", err);
                    document.getElementById("employerTableBody").innerHTML =
                        `<tr><td colspan="8" class="text-center text-danger">Failed to load employers. Check console.</td></tr>`;
                });
        }

        function changeStatus(id, status) {
            const label = status === "ACTIVE" ? "activate" : "suspend";
            if (!confirm(`Are you sure you want to ${label} this recruiter?`)) return;

            fetch(`${API_URL}/${id}/status?status=${status}`, {
                method: "PATCH",
                headers: getAuthHeaders()
            })
            .then(res => {
                if (!res.ok) throw new Error(`Status update failed: ${res.status}`);
                loadEmployers();
            })
            .catch(err => {
                console.error("Status update error:", err);
                alert("Failed to update status. Check console.");
            });
        }

        function deleteEmployer(id) {
            if (!confirm("Are you sure you want to delete this employer?")) return;
            fetch(`${API_URL}/${id}`, { method: "DELETE", headers: getAuthHeaders() })
                .then(res => {
                    if (!res.ok) throw new Error(`Delete failed: ${res.status}`);
                    loadEmployers();
                })
                .catch(err => {
                    console.error("Delete error:", err);
                    alert("Failed to delete. Check console.");
                });
        }

        function editEmployer(id) {
            alert("Edit employer ID: " + id); // replace with modal later
        }
    </script>

</body>
</html>
