<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applications - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">
    <style>
        body { margin: 0; background-color: #f4f6f9; overflow-x: hidden; }
        .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100vh; background: #0b2239; color: #fff; padding-top: 20px; transition: 0.3s; z-index: 1000; }
        .sidebar.active { left: 0; }
        .sidebar h4 { text-align: center; margin-bottom: 30px; }
        .sidebar a { color: #cfd8dc; padding: 12px 20px; display: block; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: #133b5c; color: #fff; }
        .overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.4); top: 0; left: 0; display: none; z-index: 999; }
        .overlay.active { display: block; }
        .main-content { margin-left: 0; padding: 20px; transition: 0.3s; }
        @media(min-width: 992px) { .sidebar { left: 0; } .main-content { margin-left: 250px; } }
        .card { border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.06); }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h4>Admin Panel</h4>
        <a href="dashboard.html"><i class="fa fa-chart-line me-2"></i> Dashboard</a>
        <a href="manageEmployers.html"><i class="fa fa-building me-2"></i> Employers</a>
        <a href="candidates.html"><i class="fa fa-users me-2"></i> Candidates</a>
        <a href="applications.html" class="active"><i class="fa fa-file-alt me-2"></i> Applications</a>
        <a href="#"><i class="fa fa-cog me-2"></i> Settings</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">
            <div class="container-fluid">
                <button class="btn btn-dark d-lg-none" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
                <span class="navbar-brand mb-0 h4">Applications</span>
                <span class="fw-semibold" id="adminName">Welcome, Admin</span>
            </div>
        </nav>

        <div class="row g-4 mb-4">
            <div class="col-md-4 col-sm-6">
                <div class="card p-3"><h6>Total Applications</h6><h3 id="totalApplications">—</h3></div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card p-3"><h6>Approved</h6><h3 id="approvedCount">—</h3></div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="card p-3"><h6>Pending</h6><h3 id="pendingCount">—</h3></div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5>All Applications</h5>
                <button class="btn btn-teal btn-sm"><i class="fa fa-download"></i> Export</button>
            </div>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th><th>Candidate</th><th>Job Title</th>
                            <th>Employer</th><th>Status</th><th>Date Applied</th>
                        </tr>
                    </thead>
                    <tbody id="applicationTableBody">
                        <tr><td colspan="6" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-secondary" role="status"></div> Loading...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/assets/js/bootstrap.js"></script>
    <script src="/assets/js/api.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = "login.html";

        document.getElementById("adminName").innerText = "Welcome, " + getAdminName();

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        const statusMap = {
            "APPROVED": { cls: "bg-success",           label: "Approved" },
            "APPLIED":  { cls: "bg-warning text-dark", label: "Pending"  },
            "REJECTED": { cls: "bg-danger",            label: "Rejected" }
        };

        document.addEventListener("DOMContentLoaded", loadApplications);

        async function loadApplications() {
            try {
                const data = await apiFetch("/api/admin/applications");

                document.getElementById("totalApplications").textContent = data.length;
                document.getElementById("approvedCount").textContent     = data.filter(a => a.applicationStatus === "APPROVED").length;
                document.getElementById("pendingCount").textContent      = data.filter(a => a.applicationStatus === "APPLIED").length;

                const tbody = document.getElementById("applicationTableBody");
                tbody.innerHTML = "";

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center">No applications found.</td></tr>`;
                    return;
                }

                data.forEach((app, index) => {
                    const badge = statusMap[app.applicationStatus] || { cls: "bg-secondary", label: app.applicationStatus };
                    const date  = app.appliedAt ? new Date(app.appliedAt).toLocaleDateString("en-IN") : "N/A";
                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${app.candidateName ?? "N/A"}</td>
                            <td>${app.jobTitle      ?? "N/A"}</td>
                            <td>${app.companyName   ?? "N/A"}</td>
                             <td>${getStatusBadge(app.applicationStatus)}</td>
                            <td><span class="badge ${badge.cls}">${badge.label}</span></td>
                            <td>${date}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Failed to load applications:", err);
                document.getElementById("applicationTableBody").innerHTML =
                    `<tr><td colspan="6" class="text-center text-danger">Failed to load applications.</td></tr>`;
            }
        }
    </script>
</body>
</html>
