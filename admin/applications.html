<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Applications - Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/assets/css/bootstrap.css">
<link rel="stylesheet" href="/assets/css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.card{
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="container-fluid mt-4">

<h3 class="mb-4">Applications</h3>

<!-- ================== CARDS ================== -->

<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="card p-3">
<h6>Total Applications</h6>
<h3 id="totalApplications">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Applied</h6>
<h3 id="appliedCount">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Shortlisted</h6>
<h3 id="shortlistedCount">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Hired</h6>
<h3 id="hiredCount">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Rejected</h6>
<h3 id="rejectedCount">0</h3>
</div>
</div>

</div>

<!-- ================== FILTERS ================== -->

<div class="card p-4 mb-4">

<div class="row">

<div class="col-md-4">
<input type="text" id="searchInput" class="form-control" placeholder="Search candidate or job">
</div>

<div class="col-md-3">
<select id="statusFilter" class="form-select">
<option value="">All Status</option>
<option value="APPLIED">Applied</option>
<option value="SHORTLISTED">Shortlisted</option>
<option value="HIRED">Hired</option>
<option value="REJECTED">Rejected</option>
</select>
</div>

<div class="col-md-2">
<button class="btn btn-dark w-100" onclick="applyFilters()">
<i class="fa fa-search"></i> Filter
</button>
</div>

</div>

</div>

<!-- ================== TABLE ================== -->

<div class="card p-4">

<h5 class="mb-3">All Applications</h5>

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead class="table-light">
<tr>
<th>#</th>
<th>Candidate</th>
<th>Job</th>
<th>Company</th>
<th>Status</th>
<th>Date Applied</th>
</tr>
</thead>

<tbody id="applicationTableBody">

<tr>
<td colspan="6" class="text-center">

<div class="spinner-border spinner-border-sm"></div>

</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

<script src="/assets/js/api.js"></script>

<script>

let applications=[];

document.addEventListener("DOMContentLoaded",loadApplications);



/* ================= STATUS BADGE ================= */

function getStatusBadge(status){

const map={

APPLIED:"secondary",
SHORTLISTED:"info",
HIRED:"success",
REJECTED:"danger"

};

return `<span class="badge bg-${map[status]||"dark"}">${status}</span>`;

}



/* ================= LOAD APPLICATIONS ================= */

async function loadApplications(){

try{

applications = await apiFetch("/api/admin/applications");

updateCards(applications);

renderTable(applications);

}

catch(err){

console.error("Failed to load applications:",err);

document.getElementById("applicationTableBody").innerHTML=
`<tr><td colspan="6" class="text-center text-danger">
Failed to load applications
</td></tr>`;

}

}



/* ================= UPDATE DASHBOARD CARDS ================= */

function updateCards(data){

document.getElementById("totalApplications").innerText=data.length;

document.getElementById("appliedCount").innerText=
data.filter(a=>a.applicationStatus==="APPLIED").length;

document.getElementById("shortlistedCount").innerText=
data.filter(a=>a.applicationStatus==="SHORTLISTED").length;

document.getElementById("hiredCount").innerText=
data.filter(a=>a.applicationStatus==="HIRED").length;

document.getElementById("rejectedCount").innerText=
data.filter(a=>a.applicationStatus==="REJECTED").length;

}



/* ================= RENDER TABLE ================= */

function renderTable(data){

const tbody=document.getElementById("applicationTableBody");

tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
`<tr><td colspan="6" class="text-center">No applications found</td></tr>`;

return;

}

data.forEach((app,index)=>{

const date = app.appliedAt
? new Date(app.appliedAt).toLocaleDateString("en-IN")
: "N/A";

tbody.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${app.candidateName ?? "N/A"}</td>

<td>${app.jobTitle ?? "N/A"}</td>

<td>${app.companyName ?? "N/A"}</td>

<td>${getStatusBadge(app.applicationStatus)}</td>

<td>${date}</td>

</tr>

`;

});

}



/* ================= FILTER ================= */

function applyFilters(){

const search=document.getElementById("searchInput").value.toLowerCase();

const status=document.getElementById("statusFilter").value;

let filtered=applications;



if(search){

filtered=filtered.filter(a=>

(a.candidateName||"").toLowerCase().includes(search) ||

(a.jobTitle||"").toLowerCase().includes(search)

);

}



if(status){

filtered=filtered.filter(a=>a.applicationStatus===status);

}



renderTable(filtered);

}

</script>

</body>
</html>
