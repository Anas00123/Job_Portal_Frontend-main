<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Applications - Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/bootstrap.css">
<link rel="stylesheet" href="/assets/css/style.css">

<style>

body{
margin:0;
background:#f4f6f9;
overflow-x:hidden;
}

.sidebar{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100vh;
background:#0b2239;
color:white;
padding-top:20px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar h4{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
color:#cfd8dc;
padding:12px 20px;
display:block;
text-decoration:none;
}

.sidebar a:hover,
.sidebar a.active{
background:#133b5c;
color:white;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
top:0;
left:0;
display:none;
z-index:999;
}

.overlay.active{
display:block;
}

.main-content{
margin-left:0;
padding:20px;
transition:.3s;
}

@media(min-width:992px){
.sidebar{left:0;}
.main-content{margin-left:250px;}
}

.card{
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,.06);
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<h4>Admin Panel</h4>

<a href="dashboard.html">
<i class="fa fa-chart-line me-2"></i> Dashboard
</a>

<a href="manageEmployers.html">
<i class="fa fa-building me-2"></i> Employers
</a>

<a href="candidates.html">
<i class="fa fa-users me-2"></i> Candidates
</a>

<a href="applications.html" class="active">
<i class="fa fa-file-alt me-2"></i> Applications
</a>

<a href="dashboard.html#subadmins" onclick="sessionStorage.setItem('openSubAdmins', '1')">
    <i class="fa fa-shield me-2"></i> Sub Admins
</a>
<!-- <a href="#">
<i class="fa fa-cog me-2"></i> Settings
</a> -->

<a href="#" onclick="logout()">
<i class="fa fa-sign-out-alt me-2"></i> Logout
</a>

</div>


<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>


<!-- MAIN CONTENT -->

<div class="main-content">

<nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">

<div class="container-fluid">

<button class="btn btn-dark d-lg-none" onclick="toggleSidebar()">
<i class="fa fa-bars"></i>
</button>

<span class="navbar-brand h4">Applications</span>

<span class="fw-semibold" id="adminName">Welcome Admin</span>

</div>

</nav>


<!-- DASHBOARD CARDS -->

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="card p-3">
<h6>Total Applications</h6>
<h3 id="totalApplications">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Applied</h6>
<h3 id="appliedCount">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Shortlisted</h6>
<h3 id="shortlistedCount">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Hired</h6>
<h3 id="hiredCount">0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3">
<h6>Rejected</h6>
<h3 id="rejectedCount">0</h3>
</div>
</div>

</div>


<!-- FILTER -->

<div class="card p-4 mb-4">

<div class="row">

<div class="col-md-4">

<input
type="text"
class="form-control"
placeholder="Search candidate or job"
id="searchInput">

</div>

<div class="col-md-3">

<select class="form-select" id="statusFilter">

<option value="">All Status</option>
<option value="APPLIED">Applied</option>
<option value="SHORTLISTED">Shortlisted</option>
<option value="HIRED">Hired</option>
<option value="REJECTED">Rejected</option>

</select>

</div>

<div class="col-md-2">

<button class="btn btn-dark w-100" onclick="applyFilters()">
<i class="fa fa-search"></i> Filter
</button>

</div>

</div>

</div>


<!-- APPLICATION TABLE -->

<div class="card p-4">

<div class="table-responsive">

<table class="table align-middle">

<thead class="table-light">

<tr>
<th>#</th>
<th>Candidate</th>
<th>Job</th>
<th>Employer</th>
<th>Status</th>
<th>Date Applied</th>
</tr>

</thead>

<tbody id="applicationTableBody">

<tr>
<td colspan="6" class="text-center">
<div class="spinner-border spinner-border-sm"></div>
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>



<script src="/assets/js/bootstrap.js"></script>
<script src="/assets/js/api.js"></script>


<script>

if(!isLoggedIn()){
window.location.href="login.html";
}

document.getElementById("adminName").innerText="Welcome, "+getAdminName();


function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}


let applications=[];


document.addEventListener("DOMContentLoaded",loadApplications);


function getStatusBadge(status){

const map={
APPLIED:"secondary",
SHORTLISTED:"info",
HIRED:"success",
REJECTED:"danger"
};

return `<span class="badge bg-${map[status]||"dark"}">${status}</span>`;
}



async function loadApplications(){

try{

applications = await apiFetch("/api/admin/applications");

updateCards(applications);

renderTable(applications);

}
catch(err){

console.error("Failed to load applications:",err);

document.getElementById("applicationTableBody").innerHTML=
`<tr>
<td colspan="6" class="text-danger text-center">
Failed to load applications
</td>
</tr>`;

}

}



function updateCards(data){

document.getElementById("totalApplications").innerText=data.length;

document.getElementById("appliedCount").innerText=
data.filter(a=>a.applicationStatus==="APPLIED").length;

document.getElementById("shortlistedCount").innerText=
data.filter(a=>a.applicationStatus==="SHORTLISTED").length;

document.getElementById("hiredCount").innerText=
data.filter(a=>a.applicationStatus==="HIRED").length;

document.getElementById("rejectedCount").innerText=
data.filter(a=>a.applicationStatus==="REJECTED").length;

}



function renderTable(data){

const tbody=document.getElementById("applicationTableBody");

tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
`<tr><td colspan="6" class="text-center">No applications found</td></tr>`;

return;

}

data.forEach((app,index)=>{

const date = app.appliedAt
? new Date(app.appliedAt).toLocaleDateString("en-IN")
: "N/A";

tbody.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${app.candidateName ?? "N/A"}</td>

<td>${app.jobTitle ?? "N/A"}</td>

<td>${app.companyName ?? "N/A"}</td>

<td>${getStatusBadge(app.applicationStatus)}</td>

<td>${date}</td>

</tr>

`;

});

}



function applyFilters(){

const search=document.getElementById("searchInput").value.toLowerCase();

const status=document.getElementById("statusFilter").value;

let filtered=applications;


if(search){

filtered=filtered.filter(a=>

(a.candidateName||"").toLowerCase().includes(search) ||

(a.jobTitle||"").toLowerCase().includes(search)

);

}


if(status){

filtered=filtered.filter(a=>a.applicationStatus===status);

}

renderTable(filtered);

}

</script>

</body>
</html>
