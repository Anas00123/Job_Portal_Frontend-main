<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Candidates - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">

    <style>
        body {
            margin: 0;
            background: #f4f6f9;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #0b2239;
            color: #fff;
            padding-top: 20px;
            transition: .3s;
            z-index: 1000;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: #cfd8dc;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #133b5c;
            color: #fff;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .4);
            top: 0;
            left: 0;
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .main-content {
            margin-left: 0;
            padding: 20px;
            transition: .3s;
        }

        @media(min-width:992px) {
            .sidebar {
                left: 0
            }

            .main-content {
                margin-left: 250px
            }
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, .06);
        }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar">
        <h4>Admin Panel</h4>
        <a href="dashboard.html"><i class="fa fa-chart-line me-2"></i> Dashboard</a>
        <a href="manageEmployers.html"><i class="fa fa-building me-2"></i> Employers</a>
        <a href="candidates.html" class="active"><i class="fa fa-users me-2"></i> Candidates</a>
        <a href="applications.html"><i class="fa fa-file-alt me-2"></i> Applications</a>
        <a href="#" onclick="openSubAdminSection()"><i class="bi bi-shield-lock me-2"></i> Sub
                            Admins</a>
        <a href="#"><i class="fa fa-cog me-2"></i> Settings</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main-content">

        <nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">
            <div class="container-fluid">
                <button class="btn btn-dark d-lg-none" onclick="toggleSidebar()">
                    <i class="fa fa-bars"></i>
                </button>

                <span class="navbar-brand mb-0 h4">Candidates</span>

                <span class="fw-semibold" id="adminName">Welcome, Admin</span>
            </div>
        </nav>

        <div class="row g-4 mb-4">

            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Total Candidates</h6>
                    <h3 id="totalCandidates">—</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Active Candidates</h6>
                    <h3 id="activeCandidates">—</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Blocked Candidates</h6>
                    <h3 id="blockedCandidates">—</h3>
                </div>
            </div>

        </div>

        <div class="card p-4">

            <h5 class="mb-3">All Candidates</h5>

            <div class="table-responsive">

                <table class="table align-middle">

                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                           
                            <th>Status</th>
                            <th>Registered</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="candidateTableBody">
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border spinner-border-sm"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

    </div>

    <script src="/assets/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        if (!isLoggedIn()) window.location.href = "login.html";

        document.getElementById("adminName").innerText = "Welcome, " + getAdminName();

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        document.addEventListener("DOMContentLoaded", loadCandidates);

        async function loadCandidates() {

            const tbody = document.getElementById("candidateTableBody");

            try {

                const data = await apiFetch("/api/admin/candidates");

                document.getElementById("totalCandidates").textContent = data.length;

                document.getElementById("activeCandidates").textContent =
                    data.filter(c => (c.userStatus || c.status) === "ACTIVE").length;

                document.getElementById("blockedCandidates").textContent =
                    data.filter(c => (c.userStatus || c.status) === "BLOCKED").length;

                if (data.length === 0) {

                    tbody.innerHTML = `<tr>
<td colspan="8" class="text-center">
No candidates found
</td>
</tr>`;

                    return;

                }

                let rows = "";

                data.forEach((c, i) => {

                    const status = c.userStatus || c.status;

                    const statusCls =
                        status === "ACTIVE" ? "bg-success" : "bg-danger";

                    const date = c.createdAt
                        ? new Date(c.createdAt).toLocaleDateString("en-IN")
                        : "N/A";

                    rows += `
<tr>

<td>${i + 1}</td>

<td>${c.fullName ?? "N/A"}</td>

<td>${c.email ?? "N/A"}</td>

<td>${c.phone ?? "N/A"}</td>



<td>
<span class="badge ${statusCls}">
${status ?? "N/A"}
</span>
</td>

<td>${date}</td>

<td>

<button class="btn btn-sm btn-info">
<i class="fa fa-eye"></i>
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteCandidate(${c.userId})">
<i class="fa fa-trash"></i>
</button>

</td>

</tr>
`;

                });

                tbody.innerHTML = rows;

            } catch (err) {

                console.error("Failed to load candidates:", err);

                tbody.innerHTML = `<tr>
<td colspan="8" class="text-center text-muted py-4">
<i class="fa fa-info-circle me-2"></i>
Candidates API not available yet.
</td>
</tr>`;

                ["totalCandidates", "activeCandidates", "blockedCandidates"]
                    .forEach(id => document.getElementById(id).textContent = "—");

            }

        }

        async function deleteCandidate(id) {

            if (!confirm("Delete this candidate?")) return;

            try {

                await apiFetch(`/api/admin/candidates/${id}`, {
                    method: "DELETE"
                });

                loadCandidates();

            } catch (err) {

                alert("Failed to delete candidate.");

            }

        }

        function logout() {

            document.cookie = "token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC";

            localStorage.removeItem("token");

            window.location.href = "login.html";

        }

    </script>

</body>

</html>
