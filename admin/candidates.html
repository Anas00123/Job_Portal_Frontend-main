<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Candidates - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">

    <style>
        body { margin: 0; background-color: #f4f6f9; overflow-x: hidden; }
        .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100vh; background: #0b2239; color: #fff; padding-top: 20px; transition: 0.3s; z-index: 1000; }
        .sidebar.active { left: 0; }
        .sidebar h4 { text-align: center; margin-bottom: 30px; }
        .sidebar a { color: #cfd8dc; padding: 12px 20px; display: block; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: #133b5c; color: #fff; }
        .overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.4); top: 0; left: 0; display: none; z-index: 999; }
        .overlay.active { display: block; }
        .main-content { margin-left: 0; padding: 20px; transition: 0.3s; }
        @media(min-width: 992px) { .sidebar { left: 0; } .main-content { margin-left: 250px; } }
        .card { border-radius: 12px; box-shadow: 0 0 12px rgba(0,0,0,0.06); }
    </style>
</head>

<body>

    <div class="sidebar" id="sidebar">
        <h4>Admin Panel</h4>
        <a href="dashboard.html"><i class="fa fa-chart-line me-2"></i> Dashboard</a>
        <a href="manageEmployers.html"><i class="fa fa-building me-2"></i> Employers</a>
        <a href="candidates.html" class="active"><i class="fa fa-users me-2"></i> Candidates</a>
        <a href="applications.html"><i class="fa fa-file-alt me-2"></i> Applications</a>
        <a href="#"><i class="fa fa-cog me-2"></i> Settings</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out-alt me-2"></i> Logout</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main-content">

        <nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">
            <div class="container-fluid">
                <button class="btn btn-dark d-lg-none" onclick="toggleSidebar()">
                    <i class="fa fa-bars"></i>
                </button>
                <span class="navbar-brand mb-0 h4">Candidates</span>
                <span class="fw-semibold" id="adminName">Welcome, Admin</span>
            </div>
        </nav>

        <!-- Stats -->
        <div class="row g-4 mb-4">
            <div class="col-md-4 col-sm-6">
                <div class="card p-3">
                    <h6>Total Candidates</h6>
                    <h3 id="totalCandidates">—</h3>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card p-3">
                    <h6>Active Candidates</h6>
                    <h3 id="activeCandidates">—</h3>
                </div>
            </div>
            <div class="col-md-4 col-sm-12">
                <div class="card p-3">
                    <h6>Blocked Candidates</h6>
                    <h3 id="blockedCandidates">—</h3>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h5>All Candidates</h5>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Registered</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="candidateTableBody">
                        <tr>
                            <td colspan="8" class="text-center py-4">
                                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- api.js MUST come first -->
    <script src="/assets/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? match[2] : null;
        }

        function deleteCookie(name) {
            document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;`;
        }

        function logout() {
            deleteCookie("fullName");
            deleteCookie("role");
            localStorage.clear();
            window.location.href = "login.html";
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        // ── Auth check ──
        if (!getCookie("role")) {
            window.location.href = "login.html";
        }

        document.getElementById("adminName").innerText =
            "Welcome, " + (getCookie("fullName") || "Admin");

        // ── Load candidates ──
        document.addEventListener("DOMContentLoaded", loadCandidates);

        async function loadCandidates() {
            const tbody = document.getElementById("candidateTableBody");
            try {
                // TODO: Replace with real endpoint when available e.g. /api/admin/candidates
                const data = await apiFetch("/api/admin/candidates");

                document.getElementById("totalCandidates").textContent   = data.length;
                document.getElementById("activeCandidates").textContent  = data.filter(c => c.status === "ACTIVE").length;
                document.getElementById("blockedCandidates").textContent = data.filter(c => c.status === "BLOCKED").length;

                tbody.innerHTML = "";

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" class="text-center">No candidates found.</td></tr>`;
                    return;
                }

                data.forEach((candidate, index) => {
                    const statusCls = candidate.status === "ACTIVE" ? "bg-success" : "bg-danger";
                    const date = candidate.registeredAt
                        ? new Date(candidate.registeredAt).toLocaleDateString("en-IN")
                        : "N/A";

                    tbody.innerHTML += `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${candidate.fullName  ?? "N/A"}</td>
                            <td>${candidate.email     ?? "N/A"}</td>
                            <td>${candidate.phone     ?? "N/A"}</td>
                            <td>${candidate.city      ?? "N/A"}</td>
                            <td><span class="badge ${statusCls}">${candidate.status}</span></td>
                            <td>${date}</td>
                            <td>
                                <button class="btn btn-sm btn-info"><i class="fa fa-eye"></i></button>
                                <button class="btn btn-sm btn-danger" onclick="deleteCandidate(${candidate.userId})">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });

            } catch (err) {
                console.error("Failed to load candidates:", err);
                // Show message until API is ready
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center text-muted py-4">
                            <i class="fa fa-info-circle me-2"></i>
                            Candidates API not available yet.
                        </td>
                    </tr>`;
                document.getElementById("totalCandidates").textContent   = "—";
                document.getElementById("activeCandidates").textContent  = "—";
                document.getElementById("blockedCandidates").textContent = "—";
            }
        }

        async function deleteCandidate(id) {
            if (!confirm("Are you sure you want to delete this candidate?")) return;
            try {
                await apiFetch(`/api/admin/candidates/${id}`, { method: "DELETE" });
                loadCandidates();
            } catch (err) {
                console.error("Delete error:", err);
                alert("Failed to delete candidate.");
            }
        }

    </script>

</body>
</html>
