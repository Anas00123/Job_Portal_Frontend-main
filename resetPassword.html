<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password - JobsHunt</title>

    <link rel="stylesheet" href="/assets/css/bootstrap.css">

    <link rel="stylesheet" href="./assets/css/bootstrap.css">
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <section class="login-main-section d-flex align-items-center justify-content-center min-vh-100">

        <div class="login-card glass-card z-3 rounded-5">

            <h3 class="text-center text-white mb-4">Forgot Password</h3>

            <form id="resetForm">

                <div id="message" class="text-white"></div>

                <!-- STEP 1 -->
                <div class="input-field">
                    <input type="password" id="newPassword" required>
                    <label>New Password</label>
                </div>
                <button class="btn btn-teal w-100 mt-3" id="actionBtn">
                    Continue
                </button>

            </form>
        </div>

    </section>

    <script src="./assets/js/auth.js"></script>

    <script>


        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            document.getElementById("message").innerText = "Invalid reset link.";
        }

        document.getElementById("resetForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const newPassword = document.getElementById("newPassword").value;

            const response = await fetch("http://192.168.1.3:8080/api/auth/reset-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    token: token,
                    newPassword: newPassword
                })
            });

            const result = await response.text();
            document.getElementById("message").innerText = result;
        });

    </script>

</body>

</html>
